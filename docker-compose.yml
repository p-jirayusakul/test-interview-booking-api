services:
  events_booking_db:
    container_name: database_events_booking
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_DB: events_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      PGDATA: /var/lib/postgresql/18/main
    ports:
      - "5432:5432"
    volumes:
      - psql_volume:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - events_booking
  migrate:
    image: migrate/migrate:v4.19.0
    container_name: migrate
    entrypoint: ""
    volumes:
      - ./import/migrations:/migrations
    command: >
      sh -c "migrate -path /migrations -database 'postgres://postgres:1234@events_booking_db:5432/events_booking_db?sslmode=disable' up"
    depends_on:
      events_booking_db:
        condition: service_healthy
    networks:
      - events_booking
  api:
    container_name: api_events_booking
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_PORT: "8080"
      APP_ENV: "DEV"
      APP_HOST: "localhost"
      APP_BASE_URL: "/api/v1"
      APP_VERSION: "1.0.0"
      APP_NAME: "test-interview-booking-api"
      APP_TZ: "Asia/Bangkok"
      DB_HOST: "events_booking_db"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "1234"
      DB_DBNAME: "events_booking_db"
    ports:
      - "8080:8080"
    depends_on:
      events_booking_db:
        condition: service_healthy
    networks:
      - events_booking
volumes:
  psql_volume:
networks:
  events_booking:
